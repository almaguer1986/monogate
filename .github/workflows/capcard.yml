name: CapCard Verify

on:
  push:
    paths:
      - "capability_card.json"
  pull_request:
    paths:
      - "capability_card.json"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install capcard-ai
        run: pip install capcard-ai

      - name: Verify capability card
        run: capcard verify capability_card.json
